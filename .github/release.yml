# Configuration for GitHub's automatically generated release notes.
# Consumed by `gh release create --generate-notes` (see workflows/release.yml).
#
# IMPORTANT: GitHub groups merged PRs into these categories by their *labels*,
# never by their title. This project encodes change type in Conventional Commit
# title prefixes (feat/fix/docs/...), so workflows/label-pr.yml translates each
# prefix into the matching label below. Keep the two files in sync.
#
# A PR lands in the FIRST category whose label list it matches; order matters.
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    # PRs/authors here are dropped from the notes entirely.
    labels:
      - skip-changelog
    authors:
      - dependabot
      - github-actions
  categories:
    - title: 🛠 Breaking Changes
      labels:
        - breaking-change
    - title: 🎉 New Features
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: ⚡ Performance
      labels:
        - performance
    - title: 📚 Documentation
      labels:
        - documentation
    - title: 🧹 Maintenance & CI
      labels:
        - maintenance
    # Catch-all: any merged PR not matched above (e.g. an unlabeled PR).
    - title: 📦 Other Changes
      labels:
        - "*"
