name: Release

# Build and publish installable artifacts when a version tag is pushed
# (e.g. `git tag v1.0.0 && git push origin v1.0.0`). Artifacts are attached to
# the GitHub Release for that tag:
#   - cyclone2-battery@vdemonchy.github.io.shell-extension.zip  (GNOME extension)
#   - cyclone2-applet-<tag>-x86_64-linux.tar.gz                 (COSMIC applet + daemon)
#   - cyclone2-<tag>-x86_64-linux                               (daemon, shared by both)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      EXT_UUID: cyclone2-battery@vdemonchy.github.io
    steps:
      - uses: actions/checkout@v4

      # Best-effort dependency set for building libcosmic + packaging the
      # extension. Tweak here if a future libcosmic bump needs more system libs.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake zip \
            libglib2.0-bin \
            libxkbcommon-dev libwayland-dev libudev-dev libssl-dev \
            libfontconfig-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # rustup is preinstalled on the runner; rust-toolchain.toml pins 1.93, so
      # cargo auto-selects it. Install it up front for a clear, cached step.
      - name: Install Rust toolchain (matches rust-toolchain.toml)
        run: rustup toolchain install 1.93 --profile minimal --no-self-update

      - name: Prepare output directory
        run: mkdir -p dist

      # ---- daemon (Go) ----------------------------------------------------
      - name: Build daemon
        run: go build -trimpath -ldflags="-s -w" -o "dist/cyclone2-${VERSION}-x86_64-linux" .

      # ---- COSMIC applet (Rust) ------------------------------------------
      - name: Build COSMIC applet
        working-directory: cosmic-applet
        run: cargo build --release --locked

      - name: Package COSMIC applet
        run: |
          stage="cyclone2-applet-${VERSION}-x86_64-linux"
          mkdir -p "dist/${stage}"
          cp cosmic-applet/target/release/cyclone2-applet "dist/${stage}/"
          cp cosmic-applet/data/io.github.vdemonchy.Cyclone2Battery.desktop "dist/${stage}/"
          cp "dist/cyclone2-${VERSION}-x86_64-linux" "dist/${stage}/cyclone2"
          cat > "dist/${stage}/INSTALL.txt" <<'EOF'
          COSMIC applet for the GameSir Cyclone 2 (x86_64 Linux).

          1. Install the binaries to ~/.local/bin:
               install -m0755 cyclone2-applet cyclone2 ~/.local/bin/
          2. Install the desktop entry:
               install -m0644 io.github.vdemonchy.Cyclone2Battery.desktop \
                 ~/.local/share/applications/
          3. Install the udev rule + enable the systemd user service — see the
             repository's install.sh for those DE-independent steps.
          4. Add "Cyclone 2 Battery" to your panel:
             Settings -> Desktop -> Panel/Dock -> Configure applets.
          EOF
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          rm -rf "dist/${stage}"

      # ---- GNOME extension ----------------------------------------------
      # Compile the gschema and zip the extension contents at the archive root,
      # producing a package installable with `gnome-extensions install <zip>`.
      - name: Package GNOME extension
        run: |
          ( cd "extension/${EXT_UUID}" \
              && glib-compile-schemas schemas/ \
              && zip -r -X "${GITHUB_WORKSPACE}/dist/${EXT_UUID}.shell-extension.zip" . -x '*.zip' )

      # ---- publish -------------------------------------------------------
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            "dist/${EXT_UUID}.shell-extension.zip"
            "dist/cyclone2-applet-${VERSION}-x86_64-linux.tar.gz"
            "dist/cyclone2-${VERSION}-x86_64-linux"
          )
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${files[@]}" --clobber
          else
            gh release create "${VERSION}" --title "${VERSION}" --generate-notes "${files[@]}"
          fi
