name: Release

# Build and publish installable artifacts when a version tag is pushed
# (e.g. `git tag v1.0.0 && git push origin v1.0.0`). Artifacts are attached to
# the GitHub Release for that tag:
#   - cyclone2-linux@vdemonchy.github.io.shell-extension.zip  (GNOME extension)
#   - cyclone2-applet-<tag>-x86_64-linux.tar.gz                 (COSMIC applet + daemon)
#   - cyclone2-plasmoid-<tag>.plasmoid                          (KDE Plasma 6 plasmoid)
#   - cyclone2-<tag>-x86_64-linux                               (daemon, shared by all)
#
# GitHub can't filter tag pushes by branch, so the `gate` job checks that the
# tagged commit is contained in `main`; the `release` job runs only if so. A
# tag pushed from any other branch skips the release (no build, no publish).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  # Only release tags that live on main. Skips (rather than fails) otherwise,
  # so tagging a feature branch doesn't produce a red run.
  gate:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need full history + branches to test containment
      - id: check
        name: Verify tag is on main
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is on main; proceeding."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag ${GITHUB_REF_NAME} is not on main; skipping release."
          fi

  release:
    needs: gate
    if: needs.gate.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      EXT_UUID: cyclone2-linux@vdemonchy.github.io
    steps:
      - uses: actions/checkout@v6

      # Best-effort dependency set for building libcosmic + packaging the
      # extension. Tweak here if a future libcosmic bump needs more system libs.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake zip \
            libglib2.0-bin \
            libxkbcommon-dev libwayland-dev libudev-dev libssl-dev \
            libfontconfig-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # No official actions/setup-rust exists, so use the runner's preinstalled
      # rustup. rust-toolchain.toml pins 1.93, so cargo auto-selects it; install
      # it up front for a clear, explicit step.
      - name: Install Rust toolchain (matches rust-toolchain.toml)
        run: rustup toolchain install 1.93 --profile minimal --no-self-update

      - name: Prepare output directory
        run: mkdir -p dist

      # ---- daemon (Go) ----------------------------------------------------
      - name: Build daemon
        run: go build -trimpath -ldflags="-s -w" -o "dist/cyclone2-${VERSION}-x86_64-linux" ./cmd/cyclone2

      # ---- COSMIC applet (Rust) ------------------------------------------
      - name: Build COSMIC applet
        working-directory: cosmic-applet
        run: cargo build --release --locked

      - name: Package COSMIC applet
        run: |
          stage="cyclone2-applet-${VERSION}-x86_64-linux"
          mkdir -p "dist/${stage}"
          cp cosmic-applet/target/release/cyclone2-applet "dist/${stage}/"
          cp cosmic-applet/data/io.github.vdemonchy.Cyclone2Linux.desktop "dist/${stage}/"
          cp "dist/cyclone2-${VERSION}-x86_64-linux" "dist/${stage}/cyclone2"
          cat > "dist/${stage}/INSTALL.txt" <<'EOF'
          COSMIC applet for the GameSir Cyclone 2 (x86_64 Linux).

          1. Install the binaries to ~/.local/bin:
               install -m0755 cyclone2-applet cyclone2 ~/.local/bin/
          2. Install the desktop entry:
               install -m0644 io.github.vdemonchy.Cyclone2Linux.desktop \
                 ~/.local/share/applications/
          3. Install the udev rule + enable the systemd user service — see
             INSTALL.md (or `make install`) for those DE-independent steps.
          4. Add "Cyclone 2" to your panel:
             Settings -> Desktop -> Panel/Dock -> Configure applets.
          EOF
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          rm -rf "dist/${stage}"

      # ---- KDE Plasma plasmoid -------------------------------------------
      # The plasmoid is plain QML, so "building" it is zipping the package
      # contents with metadata.json at the archive root — the layout
      # `kpackagetool6 --type Plasma/Applet --install <file>` expects.
      - name: Package KDE plasmoid
        run: |
          ( cd plasmoid/package \
              && zip -r -X "${GITHUB_WORKSPACE}/dist/cyclone2-plasmoid-${VERSION}.plasmoid" . )

      # ---- GNOME extension ----------------------------------------------
      # Compile the gschema and zip the extension contents at the archive root,
      # producing a package installable with `gnome-extensions install <zip>`.
      - name: Package GNOME extension
        run: |
          ( cd "extension/${EXT_UUID}" \
              && glib-compile-schemas schemas/ \
              && zip -r -X "${GITHUB_WORKSPACE}/dist/${EXT_UUID}.shell-extension.zip" . -x '*.zip' )

      # ---- publish -------------------------------------------------------
      # GitHub's official actions/create-release + upload-release-asset are
      # archived/deprecated, so use the official `gh` CLI (preinstalled) instead.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            "dist/${EXT_UUID}.shell-extension.zip"
            "dist/cyclone2-applet-${VERSION}-x86_64-linux.tar.gz"
            "dist/cyclone2-plasmoid-${VERSION}.plasmoid"
            "dist/cyclone2-${VERSION}-x86_64-linux"
          )
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${files[@]}" --clobber
          else
            gh release create "${VERSION}" --title "${VERSION}" --generate-notes "${files[@]}"
          fi
